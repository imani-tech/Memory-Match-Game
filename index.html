<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Memory Match Game</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="app">
    <section class="game-card">
      <div class="game-header">
        <p class="eyebrow">JavaScript Challenge</p>
        <h1>Memory Match</h1>
        <p class="intro">
          Flip two cards at a time and try to find every matching pair.
        </p>
      </div>

      <div class="stats-panel">
        <div>
          <span class="stat-label">Moves</span>
          <strong id="movesText">0</strong>
        </div>

        <div>
          <span class="stat-label">Matches</span>
          <strong id="matchesText">0 / 4</strong>
        </div>
      </div>

      <p id="messageText" class="message-text"></p>

      <div id="gameBoard" class="game-board"></div>

      <button id="resetBtn" class="reset-btn" type="button">
        Restart Game
      </button>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
